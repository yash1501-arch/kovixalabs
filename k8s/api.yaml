apiVersion: apps/v1
kind: Deployment
metadata:
  name: aismos-api
  labels:
    app: aismos-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aismos-api
  template:
    metadata:
      labels:
        app: aismos-api
    spec:
      containers:
      - name: api
        image: aismos/api:latest
        ports:
        - containerPort: 4000
        env:
        - name: NODE_ENV
          value: "production"
        - name: API_PORT
          value: "4000"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: aismos-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: aismos-secrets
              key: redis-url
        - name: AI_SERVICE_URL
          value: "http://aismos-ai:8000"
        - name: ENCRYPTION_SECRET
          valueFrom:
            secretKeyRef:
              name: aismos-secrets
              key: encryption-secret
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: aismos-api
spec:
  selector:
    app: aismos-api
  ports:
  - port: 4000
    targetPort: 4000
  type: ClusterIP
