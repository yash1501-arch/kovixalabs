apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aismos-postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aismos-redis-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aismos-qdrant-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: aismos-secrets
type: Opaque
stringData:
  database-url: "postgresql://aismos:aismos@aismos-postgres:5432/aismos?schema=public"
  redis-url: "redis://aismos-redis:6379"
  encryption-secret: "replace-with-64-char-hex-string"
  llm-api-key: ""
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aismos-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: api.aismos.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: aismos-api
            port:
              number: 4000
  - host: app.aismos.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: aismos-web
            port:
              number: 3000
