services:
  # ── Databases ────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: aismos-postgres
    environment:
      POSTGRES_USER: aismos
      POSTGRES_PASSWORD: aismos
      POSTGRES_DB: aismos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aismos -d aismos"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aismos

  mongo:
    image: mongo:7
    container_name: aismos-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aismos

  redis:
    image: redis:7-alpine
    container_name: aismos-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aismos

  qdrant:
    image: qdrant/qdrant:v1.10.1
    container_name: aismos-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - aismos

  # ── App Services ─────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: aismos-api
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      API_PORT: 4000
      API_CORS_ORIGIN: http://localhost:3000
      AI_SERVICE_URL: http://ai:8000
      DATABASE_URL: postgresql://aismos:aismos@postgres:5432/aismos?schema=public
      MONGODB_URL: mongodb://mongo:27017/aismos
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aismos

  ai:
    build:
      context: services/ai
      dockerfile: Dockerfile
    container_name: aismos-ai
    ports:
      - "8000:8000"
    environment:
      AI_DEBUG: "false"
      AI_PORT: 8000
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_API_URL: ${LLM_API_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
    networks:
      - aismos

  workers:
    build:
      context: services/workers
      dockerfile: Dockerfile
    container_name: aismos-workers
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai:8000
      DATABASE_URL: postgresql://aismos:aismos@postgres:5432/aismos?schema=public
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - aismos

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: aismos-web
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api
    networks:
      - aismos

networks:
  aismos:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  qdrant_data:

